<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AxPRO | AX team Progress Report Overview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD@100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<script src="config.js"></script>
<style>
  body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; background-image: linear-gradient(180deg, #e0f2fe 0%, #f8fafc 400px); background-repeat: no-repeat; color: #1e293b; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .ms { font-family: 'Material Symbols Outlined'; vertical-align: middle; line-height: 1; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  
  .sticky-header { position: sticky; top: 0; z-index: 50; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 4px 20px -10px rgba(0, 102, 204, 0.1); }
  
  .chip { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; white-space: nowrap; user-select: none; }
  .chip-filter { background: #f1f5f9; color: #64748b; }
  .chip-filter.active { background: #0066cc; color: #fff; box-shadow: 0 2px 8px rgba(0, 102, 204, 0.2); }
  .chip-multi { border: 1px solid #e2e8f0; background: #fff; color: #64748b; display: inline-flex; align-items: center; gap: 4px; }
  .chip-multi.selected { background: #f0f9ff; color: #0066cc; border-color: #7dd3fc; }
  
  #inputDockWrapper { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  #inputDockWrapper.expanded { max-height: 500px; overflow: visible; }
  
  .compact-input { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 600; outline: none; transition: 0.2s; }
  .compact-input:focus { background: #fff; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1); }
  
  .task-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 16px; transition: all 0.2s ease; }
  .task-card.editable:hover { border-color: #7dd3fc; box-shadow: 0 4px 12px rgba(0, 102, 204, 0.08); transform: translateY(-2px); cursor: pointer; }
  .task-card.readonly { opacity: 0.95; cursor: default; }
  
  .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
  .overlay.active { display: flex; }
  
  @keyframes pulse-sync { 50% { opacity: 0.4; } }
  .syncing { animation: pulse-sync 1s infinite; }

  .disabled-dropdown { opacity: 0.6; pointer-events: none; background-color: #f1f5f9 !important; border-color: #e2e8f0 !important; }

  /* 드롭다운: fixed 포지셔닝 기반으로 동작하므로 absolute 클래스 무력화 */
  .dropdown-menu { position: fixed !important; }
</style>
</head>
<body>

<header class="sticky-header flex flex-col">
  <div class="max-w-[1600px] w-full mx-auto px-4 lg:px-6 h-14 flex justify-between items-center border-b border-slate-100">
    <div class="flex items-baseline gap-3 shrink-0">
      <h1 class="text-xl font-[900] tracking-tighter text-[#0066cc]">AxPRO</h1>
      <span class="hidden md:inline text-[11px] font-bold text-slate-400">AX team Progress Report Overview</span>
    </div>
    <div class="flex items-center gap-4 shrink-0">
      <div class="flex items-center gap-2 mr-2">
        <span class="ms text-slate-400 text-[18px]">account_circle</span>
        <span id="loginUserInfo" class="text-[12px] font-bold text-slate-600"></span>
      </div>
      <button onclick="handleLogout()" class="text-slate-400 hover:text-rose-500 transition mr-2" title="로그아웃"><span class="ms text-[18px]">logout</span></button>
      <div class="flex items-center gap-1.5" id="statusIndicator">
        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
        <span class="text-[11px] font-black text-slate-400 uppercase tracking-wider hidden sm:inline" id="statusText">Connected</span>
      </div>
      <button onclick="commitToCloud()" class="bg-slate-800 text-white text-[12px] font-bold px-4 py-2 rounded-md hover:bg-slate-700 transition flex items-center gap-1 shadow-sm">
        <span class="ms text-[16px]">cloud_sync</span> DB 동기화
      </button>
    </div>
  </div>

  <div class="max-w-[1600px] w-full mx-auto px-4 lg:px-6 py-3 flex flex-col gap-3">
    
    <div class="flex flex-wrap items-center gap-y-3 gap-x-5 border-b border-slate-100/50 pb-3" id="filterArea1">
      <div class="flex items-center gap-2.5 shrink-0">
        <span class="text-[11px] font-black text-slate-400 uppercase tracking-wider">담당 조직</span>
        <div class="flex gap-1.5" id="memberTeamFilters">
          <button class="chip chip-filter" onclick="setFilter('memberTeam', '전체', this)">전체</button>
          <button class="chip chip-filter" onclick="setFilter('memberTeam', '식품AX', this)">식품AX</button>
          <button class="chip chip-filter" onclick="setFilter('memberTeam', '환경AX', this)">환경AX</button>
        </div>
      </div>
      <div class="w-[1px] h-4 bg-slate-200 shrink-0 hidden sm:block"></div>
      <div class="flex items-center gap-2.5 shrink-0">
        <span class="text-[11px] font-black text-slate-400 uppercase tracking-wider">담당자 검색</span>
        
        <div class="relative custom-select w-[110px]" id="wrapper-memberFilter">
          <div class="flex justify-between items-center cursor-pointer select-none py-1.5 px-3 text-[12px] font-bold text-slate-600 bg-transparent hover:bg-slate-100 rounded transition" onclick="toggleDropdown('memberFilter')">
            <span id="display-memberFilter" class="truncate w-full">전체</span>
            <span class="ms text-[14px] text-slate-400">expand_more</span>
          </div>
          <div id="drop-memberFilter" class="dropdown-menu w-[150px] bg-white border border-slate-200 rounded-lg shadow-xl z-[9999] hidden flex-col overflow-hidden">
            <div class="p-1.5 border-b border-slate-100 bg-slate-50">
              <input type="text" class="w-full bg-white border border-slate-200 rounded px-2 py-1.5 text-[12px] outline-none focus:border-blue-400" placeholder="이름 검색..." oninput="filterList('memberFilter', this.value)">
            </div>
            <div class="pb-1" id="opts-memberFilter"></div>
          </div>
        </div>

      </div>
      <div class="w-[1px] h-4 bg-slate-200 shrink-0 hidden sm:block"></div>
      <div class="flex items-center gap-2.5 shrink-0">
        <span class="text-[11px] font-black text-slate-400 uppercase tracking-wider">Period</span>
        <div class="flex gap-1.5" id="periodFilters">
          <button class="chip chip-filter" onclick="setFilter('period', '전체', this)">전체</button>
          <button class="chip chip-filter" onclick="setFilter('period', '일간', this)">일간</button>
          <button class="chip chip-filter" onclick="setFilter('period', '주간', this)">주간</button>
        </div>
      </div>
    </div>

    <div class="flex flex-col gap-2 pb-1" id="filterArea2">
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2.5 shrink-0 border-r border-slate-200 pr-4 mr-1">
          <span class="text-[11px] font-black text-slate-400 uppercase tracking-wider">사업 주관</span>
          <div class="flex gap-1.5" id="projectTeamFilters">
            <button class="chip chip-filter" onclick="setFilter('projectTeam', '전체', this)">전체</button>
            <button class="chip chip-filter" onclick="setFilter('projectTeam', '식품AX', this)">식품AX</button>
            <button class="chip chip-filter" onclick="setFilter('projectTeam', '환경AX', this)">환경AX</button>
          </div>
        </div>
        <div class="flex flex-col shrink-0 justify-center">
          <button id="btnToggleProjects" class="text-[10px] bg-slate-200 hover:bg-slate-300 text-slate-600 px-2 py-1 rounded font-bold transition" onclick="toggleAllProjects()">전체 해제</button>
        </div>
      </div>
      <div class="flex items-center gap-2 overflow-x-auto pb-1" style="-webkit-overflow-scrolling:touch;" id="projectFilters"></div>
    </div>

  </div>
</header>

<div class="max-w-[1600px] w-full mx-auto px-4 lg:px-6 pt-5">
  <button onclick="toggleInputDock()" class="flex items-center gap-1.5 text-[#0066cc] bg-blue-50 hover:bg-blue-100 px-5 py-2.5 rounded-lg text-[13px] font-bold transition w-full sm:w-auto shadow-sm">
    <span class="ms text-[18px] transition-transform duration-300" id="dockIcon">add_circle</span> 새 업무 등록
  </button>

  <div id="inputDockWrapper">
    <div class="bg-white border border-blue-100 rounded-xl p-5 mt-3 shadow-md flex flex-col gap-4">
      <div class="flex flex-col sm:flex-row gap-3">
        
        <div class="relative custom-select sm:w-[160px] shrink-0" id="wrapper-inProject">
          <div class="compact-input flex justify-between items-center cursor-pointer select-none" onclick="toggleDropdown('inProject')">
            <span id="display-inProject" class="truncate text-slate-400">과제명 선택</span>
            <span class="ms text-[16px] text-slate-400">expand_more</span>
          </div>
          <div id="drop-inProject" class="dropdown-menu w-[200px] bg-white border border-slate-200 rounded-lg shadow-xl z-[9999] hidden flex-col overflow-hidden">
            <div class="p-1.5 border-b border-slate-100 bg-slate-50">
              <input type="text" class="w-full bg-white border border-slate-200 rounded px-2 py-1.5 text-[12px] outline-none focus:border-blue-400" placeholder="과제 검색..." oninput="filterList('inProject', this.value)">
            </div>
            <div class="pb-1" id="opts-inProject"></div>
          </div>
        </div>

        <div class="relative custom-select sm:w-[120px] shrink-0" id="wrapper-inMember">
          <div class="compact-input flex justify-between items-center cursor-pointer select-none" onclick="toggleDropdown('inMember')">
            <span id="display-inMember" class="truncate text-slate-400">담당자 선택</span>
            <span class="ms text-[16px] text-slate-400">expand_more</span>
          </div>
          <div id="drop-inMember" class="dropdown-menu w-[150px] bg-white border border-slate-200 rounded-lg shadow-xl z-[9999] hidden flex-col overflow-hidden">
            <div class="p-1.5 border-b border-slate-100 bg-slate-50">
              <input type="text" class="w-full bg-white border border-slate-200 rounded px-2 py-1.5 text-[12px] outline-none focus:border-blue-400" placeholder="이름 검색..." oninput="filterList('inMember', this.value)">
            </div>
            <div class="pb-1" id="opts-inMember"></div>
          </div>
        </div>

        <input type="text" id="inTask" class="compact-input flex-1 min-w-0" placeholder="수행할 업무 내용을 입력하세요... (Enter 등록)" onkeypress="if(event.keyCode==13) addTask()">
      </div>
      <div class="flex flex-wrap items-center gap-3 bg-slate-50/50 p-3 rounded-lg border border-slate-100">
        <select id="inPeriod" class="compact-input w-[100px] cursor-pointer text-center py-2"><option value="일간">🔥 일간</option><option value="주간">📅 주간</option></select>
        <select id="inStatus" class="compact-input w-[100px] cursor-pointer text-center py-2"><option value="대기" selected>대기</option><option value="진행중">진행중</option><option value="완료">완료</option><option value="보류">보류</option><option value="문제발생">문제발생</option></select>
        <div class="flex items-center gap-1 bg-white border border-slate-200 rounded-lg px-3 h-[40px]">
          <input type="number" id="inProgress" class="bg-transparent w-[40px] text-center text-[14px] font-bold outline-none" value="0" min="0" max="100">
          <span class="text-[13px] font-bold text-slate-400">%</span>
        </div>
        <select id="inPriority" class="compact-input w-[80px] cursor-pointer text-center py-2"><option value="상">상</option><option value="중" selected>중</option><option value="하">하</option></select>
        <div class="flex-1 min-w-[20px]"></div>
        <button onclick="addTask()" class="bg-[#0066cc] text-white px-8 py-2.5 rounded-lg text-[14px] font-bold hover:bg-blue-700 transition shrink-0 shadow-md">등록하기</button>
      </div>
    </div>
  </div>
</div>

<main class="max-w-[1600px] w-full mx-auto px-4 lg:px-6 py-8 flex flex-col gap-8" id="boardContainer">
  <div class="text-center text-slate-400 font-bold mt-20 opacity-50"><span class="ms text-[40px] block mb-2 animate-spin">sync</span>데이터를 불러오는 중...</div>
</main>

<div class="overlay" id="editModal">
  <div class="bg-white rounded-2xl w-full max-w-[540px] p-8 relative shadow-2xl">
    <button onclick="closeEditModal()" class="absolute top-5 right-5 text-slate-400 hover:text-rose-500 transition"><span class="ms text-[24px]">close</span></button>
    <h3 class="text-[14px] font-black tracking-wider text-slate-800 uppercase mb-6">업무 상세 수정</h3>
    <input type="hidden" id="edId">
    
    <div class="flex gap-4 mb-5">
      <div class="relative custom-select flex-1" id="wrapper-edProject">
        <div class="compact-input flex justify-between items-center cursor-pointer select-none" onclick="toggleDropdown('edProject')">
          <span id="display-edProject" class="truncate">과제명</span>
          <span class="ms text-[16px] text-slate-400">expand_more</span>
        </div>
        <div id="drop-edProject" class="dropdown-menu w-[240px] bg-white border border-slate-200 rounded-lg shadow-xl z-[9999] hidden flex-col overflow-hidden">
          <div class="p-1.5 border-b border-slate-100 bg-slate-50">
            <input type="text" class="w-full bg-white border border-slate-200 rounded px-2 py-1.5 text-[12px] outline-none focus:border-blue-400" placeholder="과제 검색..." oninput="filterList('edProject', this.value)">
          </div>
          <div class="pb-1" id="opts-edProject"></div>
        </div>
      </div>

      <div class="relative custom-select w-[120px]" id="wrapper-edMember">
        <div class="compact-input flex justify-between items-center cursor-pointer select-none" onclick="toggleDropdown('edMember')">
          <span id="display-edMember" class="truncate">담당자</span>
          <span class="ms text-[16px] text-slate-400">expand_more</span>
        </div>
        <div id="drop-edMember" class="dropdown-menu w-[150px] bg-white border border-slate-200 rounded-lg shadow-xl z-[9999] hidden flex-col overflow-hidden">
          <div class="p-1.5 border-b border-slate-100 bg-slate-50">
            <input type="text" class="w-full bg-white border border-slate-200 rounded px-2 py-1.5 text-[12px] outline-none focus:border-blue-400" placeholder="이름 검색..." oninput="filterList('edMember', this.value)">
          </div>
          <div class="pb-1" id="opts-edMember"></div>
        </div>
      </div>
    </div>
    <textarea id="edTask" class="compact-input w-full min-h-[100px] resize-none mb-5 text-[14px] leading-relaxed" placeholder="수행할 내용"></textarea>
    
    <div class="flex gap-4 mb-8">
      <select id="edPeriod" class="compact-input w-[100px] cursor-pointer text-center"><option value="일간">🔥 일간</option><option value="주간">📅 주간</option></select>
      <select id="edStatus" class="compact-input flex-1"><option>대기</option><option>진행중</option><option>완료</option><option>보류</option><option>문제발생</option></select>
      <div class="flex items-center gap-1 bg-[#f8fafc] border border-slate-200 rounded-lg px-3">
        <input type="number" id="edProgress" class="bg-transparent w-[50px] text-center text-[14px] font-bold outline-none" placeholder="0">
        <span class="text-[13px] font-bold text-slate-400">%</span>
      </div>
      <select id="edPriority" class="compact-input flex-1"><option>상</option><option>중</option><option>하</option></select>
    </div>

    <div class="flex justify-between items-center pt-5 border-t border-slate-100">
      <button onclick="deleteTask()" class="text-rose-500 text-[13px] font-bold px-3 py-2 hover:bg-rose-50 rounded transition">삭제</button>
      <button onclick="saveEdit()" class="bg-[#0066cc] text-white text-[13px] font-bold px-8 py-3 rounded-lg hover:bg-blue-700 transition shadow-md">변경사항 저장</button>
    </div>
  </div>
</div>

<form id="hidden_form" target="hidden_iframe" method="POST" style="display:none;"><input type="hidden" name="payload" id="payload_input"></form>
<iframe name="hidden_iframe" style="display:none;" onload="if(window.isSaving) onSaveSuccess();"></iframe>

<script>
  const S_ID = (typeof CONFIG !== 'undefined' && CONFIG.SHEET_ID) ? CONFIG.SHEET_ID : '';
  const A_URL = (typeof CONFIG !== 'undefined' && CONFIG.API_URL) ? CONFIG.API_URL : '';

  const userStr = sessionStorage.getItem('axUser');
  if(!userStr) { alert("로그인이 필요합니다."); location.replace('index.html'); }
  const currentUser = JSON.parse(userStr);
  document.getElementById('loginUserInfo').textContent = `${currentUser.dept || ''} ${currentUser.name} ${currentUser.rank || ''}`;

  const isAxTeam = currentUser.dept && (currentUser.dept.includes('식품') || currentUser.dept.includes('환경'));
  const isManager = currentUser.rank && (currentUser.rank.includes('팀장') || currentUser.rank.includes('실장') || currentUser.rank.includes('사장') || currentUser.rank.includes('본부장'));
  const isRegularAxMember = isAxTeam && !isManager;

  let userTeamKeyword = '';
  if (currentUser.dept && currentUser.dept.includes('식품')) userTeamKeyword = '식품';
  else if (currentUser.dept && currentUser.dept.includes('환경')) userTeamKeyword = '환경';

  let rawData = { members: [], projects: [], tasks: [] };
  
  let filters = { 
    memberTeam: '전체',
    projectTeam: '전체',
    period: '전체', 
    member: isRegularAxMember ? currentUser.name : '전체', 
    selectedProjects: new Set() 
  };
  let isDockOpen = false;

  let cv = { memberFilter: '', inProject: '', inMember: '', edProject: '', edMember: '' };

  window.onload = async () => {
    if(!S_ID) return alert("config.js에 SHEET_ID가 없습니다.");
    await Promise.all([
      fetchData('members').then(d => rawData.members = d),
      fetchData('projects').then(d => rawData.projects = d),
      fetchData('tasks').then(d => rawData.tasks = d)
    ]);
    
    applySmartSorting(); 
    initFilterUI();      
    
    renderProjectDropdowns();
    renderMemberDropdowns(); 

    applyRoleBasedUI();  
    
    updateProjectChips(); 
    renderBoard();
  };

  // ★ 핵심 수정: fixed 포지셔닝으로 드롭다운 위치 계산 (overflow/stacking context 완전 우회)
  function toggleDropdown(id) {
    const wrapper = document.getElementById(`wrapper-${id}`);
    if (wrapper && wrapper.classList.contains('disabled-dropdown')) return;

    const drop = document.getElementById(`drop-${id}`);
    const isHidden = drop.classList.contains('hidden');
    
    // 모든 드롭다운 닫기
    document.querySelectorAll('.dropdown-menu').forEach(el => el.classList.add('hidden'));
    
    if (isHidden) {
      const rect = wrapper.getBoundingClientRect();
      // 드롭다운 너비: wrapper 너비와 지정 최소 너비 중 큰 값
      const minWidths = { memberFilter: 150, inProject: 200, inMember: 150, edProject: 240, edMember: 150 };
      const minW = minWidths[id] || 150;
      const dropWidth = Math.max(rect.width, minW);

      // 화면 오른쪽 잘림 방지
      const leftPos = Math.min(rect.left, window.innerWidth - dropWidth - 8);

      drop.style.top = (rect.bottom + 4) + 'px';
      drop.style.left = leftPos + 'px';
      drop.style.width = dropWidth + 'px';

      drop.classList.remove('hidden');
      const input = drop.querySelector('input');
      if (input) {
        input.value = ''; 
        filterList(id, ''); 
        input.focus();
      }
    }
  }

  // 스크롤/리사이즈 시 드롭다운 닫기
  window.addEventListener('scroll', () => {
    document.querySelectorAll('.dropdown-menu').forEach(el => el.classList.add('hidden'));
  }, true);
  window.addEventListener('resize', () => {
    document.querySelectorAll('.dropdown-menu').forEach(el => el.classList.add('hidden'));
  });

  function selectOption(id, value, text) {
    cv[id] = value;
    const display = document.getElementById(`display-${id}`);
    display.textContent = text || value || '선택';
    display.classList.remove('text-slate-400');
    display.classList.add('text-slate-800');

    document.getElementById(`drop-${id}`).classList.add('hidden');
    
    if (id === 'memberFilter') {
      filters.member = value === '' ? '전체' : value;
      updateProjectChips();
      renderBoard();
    }
  }

  function filterList(id, query) {
    const opts = document.getElementById(`opts-${id}`).children;
    const q = query.toLowerCase();
    for(let opt of opts) {
      const txt = opt.textContent.toLowerCase();
      opt.style.display = txt.includes(q) ? 'block' : 'none';
    }
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.custom-select')) {
      document.querySelectorAll('.dropdown-menu').forEach(el => el.classList.add('hidden'));
    }
  });

  function applySmartSorting() {
    if(!userTeamKeyword) return; 

    rawData.members.sort((a, b) => {
      const aIsMyTeam = a.dept && a.dept.includes(userTeamKeyword);
      const bIsMyTeam = b.dept && b.dept.includes(userTeamKeyword);
      if (aIsMyTeam && !bIsMyTeam) return -1;
      if (!aIsMyTeam && bIsMyTeam) return 1;
      return 0;
    });

    rawData.projects.sort((a, b) => {
      const aIsMyTeam = a.team && a.team.includes(userTeamKeyword);
      const bIsMyTeam = b.team && b.team.includes(userTeamKeyword);
      if (aIsMyTeam && !bIsMyTeam) return -1;
      if (!aIsMyTeam && bIsMyTeam) return 1;
      return 0;
    });
  }

  function initFilterUI() {
    document.querySelectorAll('#memberTeamFilters .chip').forEach(c => { c.classList.toggle('active', c.textContent === filters.memberTeam); });
    document.querySelectorAll('#projectTeamFilters .chip').forEach(c => { c.classList.toggle('active', c.textContent === filters.projectTeam); });
    document.querySelectorAll('#periodFilters .chip').forEach(c => { c.classList.toggle('active', c.textContent === filters.period); });
    
    if(filters.member !== '전체') {
      selectOption('memberFilter', filters.member, filters.member);
    } else {
      selectOption('memberFilter', '', '전체');
    }
  }

  function applyRoleBasedUI() {
    if(isRegularAxMember) {
      selectOption('inMember', currentUser.name, currentUser.name);
      document.getElementById('wrapper-inMember').classList.add('disabled-dropdown');
    }
  }

  function handleLogout() { sessionStorage.removeItem('axUser'); location.replace('index.html'); }

  async function fetchData(sheetName) {
    try {
      const res = await fetch(`https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`);
      return parseCSV(await res.text());
    } catch(e) { console.error(e); return []; }
  }
  function parseCSV(t) {
    const lines=t.trim().split('\n'); if(lines.length<2) return [];
    const hdrs=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
    return lines.slice(1).map(l=>{
      const v=[]; let c='', q=false;
      for(let i=0; i<l.length; i++){ const ch=l[i]; if(ch==='"') q=!q; else if(ch===','&&!q){v.push(c.trim());c='';} else c+=ch; }
      v.push(c.trim()); const o={}; hdrs.forEach((h,i)=>o[h]=(v[i]||'').replace(/^"|"$/g,'')); return o;
    }).filter(row => Object.values(row).some(val => val !== '')); 
  }

  function renderProjectDropdowns() {
    const html = rawData.projects.map(p => `<div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-[13px] text-slate-700 font-medium border-b border-slate-50 last:border-0" onclick="selectOption('__ID__', '${p.short_name}', '${p.short_name}')">${p.short_name}</div>`).join('');
    
    document.getElementById('opts-inProject').innerHTML = html.replace(/__ID__/g, 'inProject');
    document.getElementById('opts-edProject').innerHTML = html.replace(/__ID__/g, 'edProject');
  }

  function renderMemberDropdowns() {
    let allValidMembers = rawData.members.filter(m => m.dept && (m.dept.includes('식품') || m.dept.includes('환경')));
    
    const prioritizeTeam = filters.memberTeam !== '전체' ? filters.memberTeam.replace('AX', '').trim() : userTeamKeyword;
    
    allValidMembers.sort((a, b) => {
      const aIsPriority = prioritizeTeam && a.dept && a.dept.includes(prioritizeTeam);
      const bIsPriority = prioritizeTeam && b.dept && b.dept.includes(prioritizeTeam);
      if (aIsPriority && !bIsPriority) return -1;
      if (!aIsPriority && bIsPriority) return 1;
      return 0; 
    });

    const filterHTML = `<div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-[13px] font-black text-blue-600 border-b border-slate-100" onclick="selectOption('memberFilter', '', '전체')">전체</div>` 
                     + allValidMembers.map(m => `<div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-[13px] text-slate-700 font-medium border-b border-slate-50 last:border-0" onclick="selectOption('memberFilter', '${m.name}', '${m.name}')">${m.name}</div>`).join('');
    document.getElementById('opts-memberFilter').innerHTML = filterHTML;

    const memHTML = allValidMembers.map(m => `<div class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-[13px] text-slate-700 font-medium border-b border-slate-50 last:border-0" onclick="selectOption('__ID__', '${m.name}', '${m.name}')">${m.name}</div>`).join('');
    document.getElementById('opts-inMember').innerHTML = memHTML.replace(/__ID__/g, 'inMember');
    document.getElementById('opts-edMember').innerHTML = memHTML.replace(/__ID__/g, 'edMember');
  }

  function setFilter(type, value, btnElement) {
    filters[type] = value;
    
    if(btnElement) {
      btnElement.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      btnElement.classList.add('active');
    }
    
    if(type === 'memberTeam') {
      selectOption('memberFilter', '', '전체'); 
      renderMemberDropdowns(); 
    }
    if(type === 'projectTeam') {
      updateProjectChips();
    }
    renderBoard();
  }

  function getActiveTasksForChips() {
    return rawData.tasks.filter(t => {
      if(filters.period !== '전체' && t.period !== filters.period) return false;
      if(filters.member !== '전체' && filters.member !== '' && t.member_name !== filters.member) return false;
      if(filters.memberTeam !== '전체') {
        const memberInfo = rawData.members.find(m => m.name === t.member_name);
        if(!memberInfo || !memberInfo.dept || !memberInfo.dept.includes(filters.memberTeam.replace('AX', ''))) return false;
      }
      return true;
    });
  }

  function toggleAllProjects() {
    const targetProjs = filters.projectTeam === '전체' ? rawData.projects : rawData.projects.filter(p => p.team === filters.projectTeam);
    const activeTasks = getActiveTasksForChips();
    const selectableProjs = targetProjs.filter(p => activeTasks.some(t => t.project_short === p.short_name));
    
    if (filters.selectedProjects.size === selectableProjs.length && selectableProjs.length > 0) {
      filters.selectedProjects.clear();
    } else {
      selectableProjs.forEach(p => filters.selectedProjects.add(p.short_name));
    }
    renderProjectChipsUI(); 
    renderBoard();
  }

  function toggleProjectChip(projName, chipElement) {
    if(chipElement.classList.contains('opacity-40')) return; 
    if (filters.selectedProjects.has(projName)) filters.selectedProjects.delete(projName);
    else filters.selectedProjects.add(projName);
    
    renderProjectChipsUI(); renderBoard();
  }

  function renderProjectChipsUI() {
    const targetProjs = filters.projectTeam === '전체' ? rawData.projects : rawData.projects.filter(p => p.team === filters.projectTeam);
    const activeTasks = getActiveTasksForChips();
    const selectableProjs = targetProjs.filter(p => activeTasks.some(t => t.project_short === p.short_name));
    
    const btnToggle = document.getElementById('btnToggleProjects');
    if (selectableProjs.length === 0) {
      btnToggle.textContent = '선택 불가';
      btnToggle.classList.add('opacity-40', 'cursor-not-allowed');
      btnToggle.classList.remove('hover:bg-slate-300');
    } else if (filters.selectedProjects.size === selectableProjs.length) {
      btnToggle.textContent = '전체 해제';
      btnToggle.classList.remove('opacity-40', 'cursor-not-allowed');
      btnToggle.classList.add('hover:bg-slate-300');
    } else {
      btnToggle.textContent = '전체 선택';
      btnToggle.classList.remove('opacity-40', 'cursor-not-allowed');
      btnToggle.classList.add('hover:bg-slate-300');
    }

    document.getElementById('projectFilters').innerHTML = targetProjs.map(p => {
      const taskCount = activeTasks.filter(t => t.project_short === p.short_name).length;
      if (taskCount === 0) {
        return `<button class="chip chip-multi opacity-40 cursor-not-allowed bg-slate-50 border-slate-200 text-slate-400" title="해당 조건에 등록된 업무 없음">${p.short_name}</button>`;
      } else {
        const isSelected = filters.selectedProjects.has(p.short_name);
        return `<button class="chip chip-multi ${isSelected ? 'selected' : ''}" onclick="toggleProjectChip('${p.short_name}', this)">
                  ${isSelected ? '<span class="ms text-[14px]">check</span>' : ''} ${p.short_name}
                </button>`;
      }
    }).join('');
  }

  function updateProjectChips() {
    filters.selectedProjects.clear();
    const targetProjs = filters.projectTeam === '전체' ? rawData.projects : rawData.projects.filter(p => p.team === filters.projectTeam);
    const activeTasks = getActiveTasksForChips();
    
    targetProjs.forEach(p => {
      const taskCount = activeTasks.filter(t => t.project_short === p.short_name).length;
      if (taskCount > 0) filters.selectedProjects.add(p.short_name);
    });
    renderProjectChipsUI();
  }

  function renderBoard() {
    const container = document.getElementById('boardContainer');

    const filteredTasks = rawData.tasks.filter(t => {
      if(filters.period !== '전체' && t.period !== filters.period) return false;
      if(filters.member !== '전체' && filters.member !== '' && t.member_name !== filters.member) return false;
      if(filters.memberTeam !== '전체') {
        const memberInfo = rawData.members.find(m => m.name === t.member_name);
        if(!memberInfo || !memberInfo.dept || !memberInfo.dept.includes(filters.memberTeam.replace('AX', ''))) return false;
      }
      if(filters.selectedProjects.size > 0 && !filters.selectedProjects.has(t.project_short)) return false;
      return true;
    });

    const grouped = {};
    filters.selectedProjects.forEach(proj => grouped[proj] = []); 
    filteredTasks.forEach(t => { if(grouped[t.project_short] !== undefined) grouped[t.project_short].push(t); });

    const activeProjects = Object.keys(grouped).filter(proj => grouped[proj].length > 0);

    if(activeProjects.length === 0) {
      container.innerHTML = `<div class="text-center text-slate-400 font-bold mt-24 opacity-50 text-[14px]">해당 조건에 부합하는 과제 및 업무가 없습니다.</div>`;
      return;
    }

    container.innerHTML = activeProjects.map(projName => {
      const projInfo = rawData.projects.find(p => p.short_name === projName) || {};
      const tList = grouped[projName];
      const dailyTasks = tList.filter(t => t.period === '일간');
      const weeklyTasks = tList.filter(t => t.period === '주간');
      
      return `
      <section class="bg-white rounded-[20px] shadow-sm border border-slate-200 p-5 lg:p-7">
        <div class="flex items-center gap-3 mb-5 pb-4 border-b border-slate-100">
          <span class="bg-blue-50 text-[#0066cc] text-[11px] font-black px-2 py-0.5 rounded">${projInfo.team || '미분류'}</span>
          <h2 class="text-xl font-[800] text-slate-800 leading-none">${projName}</h2>
          <span class="text-[13px] text-slate-400 font-medium hidden sm:inline ml-1">- ${projInfo.full_name || ''}</span>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 lg:gap-10">
          <div class="flex flex-col gap-3">
            <div class="text-[12px] font-black text-rose-500 uppercase flex items-center gap-1.5"><span class="ms text-[16px]">local_fire_department</span> Daily Focus</div>
            ${dailyTasks.length ? dailyTasks.map(t => generateTaskCard(t)).join('') : '<div class="text-[13px] text-slate-400 py-3 font-medium">등록된 일간 업무가 없습니다.</div>'}
          </div>
          <div class="flex flex-col gap-3 lg:border-l lg:border-slate-100 lg:pl-10">
            <div class="text-[12px] font-black text-[#0066cc] uppercase flex items-center gap-1.5"><span class="ms text-[16px]">calendar_today</span> Weekly Flow</div>
            ${weeklyTasks.length ? weeklyTasks.map(t => generateTaskCard(t)).join('') : '<div class="text-[13px] text-slate-400 py-3 font-medium">등록된 주간 업무가 없습니다.</div>'}
          </div>
        </div>
      </section>`;
    }).join('');
  }

  function generateTaskCard(t) {
    const pColor = t.priority === '상' ? 'text-rose-600 bg-rose-50' : (t.priority === '중' ? 'text-slate-500 bg-slate-100' : 'text-slate-400 bg-slate-50');
    let sColor = 'text-slate-600 bg-slate-50';
    if(t.status === '대기') sColor = 'text-emerald-600 bg-emerald-50';
    else if(t.status === '진행중') sColor = 'text-blue-600 bg-blue-50';
    else if(t.status === '문제발생') sColor = 'text-rose-600 bg-rose-50';
    else if(t.status === '완료') sColor = 'text-slate-400 bg-slate-100 line-through';
    
    const canEdit = isManager || t.member_name === currentUser.name;
    const onClickAction = canEdit ? `openEditModal('${t.id}')` : `alert('열람 전용입니다. 타인의 업무는 수정/삭제할 수 없습니다.')`;
    const cardClass = canEdit ? 'editable' : 'readonly';

    return `
    <div class="task-card ${cardClass}" onclick="${onClickAction}">
      <div class="flex justify-between items-start gap-3 mb-2.5">
        <p class="text-[14px] font-semibold text-slate-700 leading-relaxed break-keep whitespace-pre-wrap">${t.content}</p>
        <span class="${pColor} text-[11px] font-bold px-2 py-0.5 rounded shrink-0">${t.priority}</span>
      </div>
      <div class="flex items-center gap-2.5">
        <span class="bg-slate-100 text-slate-600 text-[11px] font-bold px-2 py-1 rounded">${t.member_name}</span>
        ${t.progress ? `<div class="flex-1 max-w-[80px] h-[6px] bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-500" style="width:${t.progress}%"></div></div><span class="text-[11px] font-bold text-slate-400">${t.progress}%</span>` : ''}
        <span class="ml-auto text-[11px] font-black ${sColor} px-2 py-1 rounded">${t.status}</span>
      </div>
    </div>`;
  }

  function toggleInputDock() {
    const dock = document.getElementById('inputDockWrapper');
    isDockOpen = !isDockOpen;
    dock.classList.toggle('expanded');
    document.getElementById('dockIcon').style.transform = isDockOpen ? "rotate(45deg)" : "rotate(0deg)";
  }

  function addTask() {
    const proj = cv.inProject;
    const mem = isRegularAxMember ? currentUser.name : cv.inMember;
    const task = document.getElementById('inTask').value.trim();
    
    if(!proj || !task || !mem) return alert("과제명, 담당자, 업무 내용을 모두 선택/입력하세요.");
    
    const newTask = {
      id: 'T-' + Date.now(), project_short: proj, member_name: mem, content: task,
      period: document.getElementById('inPeriod').value, 
      status: document.getElementById('inStatus').value, 
      progress: document.getElementById('inProgress').value || 0, 
      priority: document.getElementById('inPriority').value,
      last_updated: new Date().toISOString()
    };
    
    rawData.tasks.push(newTask);
    document.getElementById('inTask').value = '';
    document.getElementById('inProgress').value = 0;
    document.getElementById('inStatus').value = '대기';
    document.getElementById('inPriority').value = '중';
    
    selectOption('inProject', '', '과제명 선택');
    if(!isRegularAxMember) selectOption('inMember', '', '담당자 선택');

    updateProjectChips(); renderBoard(); commitToCloud();
  }

  function openEditModal(id) {
    const t = rawData.tasks.find(x => x.id === id);
    if(!t) return;

    if(isRegularAxMember && t.member_name !== currentUser.name) {
      alert("🚫 [접근 제한] 타인 업무 수정 불가\n\n팀원은 본인이 작성한 업무만 수정/삭제가 가능합니다.");
      return;
    }

    document.getElementById('edId').value = t.id;
    selectOption('edProject', t.project_short, t.project_short);
    selectOption('edMember', t.member_name, t.member_name);
    
    document.getElementById('edTask').value = t.content;
    document.getElementById('edPeriod').value = t.period || '일간';
    document.getElementById('edStatus').value = t.status || '대기';
    document.getElementById('edProgress').value = t.progress || 0;
    document.getElementById('edPriority').value = t.priority || '중';

    const wrapperEdMember = document.getElementById('wrapper-edMember');
    if(isRegularAxMember) {
      wrapperEdMember.classList.add('disabled-dropdown');
    } else {
      wrapperEdMember.classList.remove('disabled-dropdown');
    }

    document.getElementById('editModal').classList.add('active');
  }

  function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }

  function saveEdit() {
    const id = document.getElementById('edId').value;
    const idx = rawData.tasks.findIndex(x => x.id === id);
    if(idx > -1) {
      const finalMemberName = isRegularAxMember ? rawData.tasks[idx].member_name : cv.edMember;

      rawData.tasks[idx] = {
        id: id, project_short: cv.edProject,
        member_name: finalMemberName, content: document.getElementById('edTask').value,
        period: document.getElementById('edPeriod').value, status: document.getElementById('edStatus').value,
        progress: document.getElementById('edProgress').value, priority: document.getElementById('edPriority').value,
        last_updated: new Date().toISOString()
      };
      closeEditModal(); updateProjectChips(); renderBoard(); commitToCloud();
    }
  }

  function deleteTask() {
    if(!confirm("이 업무를 삭제하시겠습니까?")) return;
    const id = document.getElementById('edId').value;
    rawData.tasks = rawData.tasks.filter(x => x.id !== id);
    closeEditModal(); updateProjectChips(); renderBoard(); commitToCloud();
  }

  function commitToCloud() {
    if(!A_URL) return alert('API 주소가 설정되지 않았습니다.');
    if(window.isSaving) return;
    window.isSaving = true;

    document.getElementById('statusIndicator').querySelector('div').classList.replace('bg-emerald-500', 'bg-blue-500');
    document.getElementById('statusIndicator').querySelector('div').classList.add('syncing');
    document.getElementById('statusText').textContent = "Syncing...";

    const payload = { action: 'write', sheetName: 'tasks', data: rawData.tasks };
    document.getElementById('payload_input').value = JSON.stringify(payload);
    document.getElementById('hidden_form').action = A_URL;
    document.getElementById('hidden_form').submit();
  }

  function onSaveSuccess() {
    window.isSaving = false;
    document.getElementById('statusIndicator').querySelector('div').classList.replace('bg-blue-500', 'bg-emerald-500');
    document.getElementById('statusIndicator').querySelector('div').classList.remove('syncing');
    document.getElementById('statusText').textContent = "Connected";
  }

  function manualSync() { commitToCloud(); }
  window.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); manualSync(); } });
</script>
</body>
