<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AxPRO | 설정</title>
<style>
  body{ font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif; background:#f1f5f9; margin:0; height:100vh; display:flex; flex-direction:column; overflow:hidden; color:#111827; }
  .ic{ display:inline-block; vertical-align:-.18em; width:18px; height:18px; flex:none; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .tab{ padding:12px 22px; font-weight:800; font-size:14px; color:#64748b; border-bottom:3px solid transparent; cursor:pointer; transition:.2s; }
  .tab.active{ color:#0066cc; border-bottom-color:#0066cc; }
  .tab .ic{ margin-right:4px; }

  /* layout / topbar */
  .topbar{ background:#ffffff; border-bottom:1px solid #e2e8f0; padding:16px 24px 0; display:flex; justify-content:space-between; align-items:flex-end; flex-shrink:0; }
  .topbar-left{ display:flex; align-items:flex-end; gap:24px; }
  .title-block{ padding-bottom:12px; }
  .title{ margin:0; font-size:20px; line-height:28px; font-weight:900; color:#1e293b; }
  .subtitle{ margin:4px 0 0; font-size:11px; color:#94a3b8; font-weight:700; }
  .tabs{ display:flex; gap:4px; }
  .board-btn{ margin-bottom:12px; display:flex; align-items:center; gap:8px; background:#0f172a; color:#ffffff; padding:8px 16px; border-radius:8px; font-size:12px; line-height:16px; font-weight:700; text-decoration:none; transition:background-color .15s ease; }
  .board-btn:hover{ background:#334155; }
  .main{ flex:1 1 0%; position:relative; }
  .frame{ width:100%; height:100%; border:none; position:absolute; inset:0; }

  @media (prefers-color-scheme:dark){ body{ background:#0b0e15; color:#e5ecf6; } header{ background:#141a26 !important; border-color:#2a3446 !important; } .text-slate-800{ color:#e5ecf6 !important; } }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-group" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
  <symbol id="i-folder_special" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></symbol>
  <symbol id="i-dashboard" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></symbol>
</defs></svg>
<header class="topbar">
  <div class="topbar-left">
    <div class="title-block"><h1 class="title text-slate-800">AxPRO 설정</h1><p class="subtitle">조직 및 과제 관리</p></div>
    <div class="tabs">
      <button class="tab active" onclick="tab('members',this)"><svg class="ic"><use href="#i-group"/></svg> 구성원</button>
      <button class="tab" onclick="tab('projects',this)"><svg class="ic"><use href="#i-folder_special"/></svg> 과제</button>
    </div>
  </div>
  <a href="app.html" class="board-btn"><svg class="ic"><use href="#i-dashboard"/></svg> 보드로</a>
</header>
<main class="main"><iframe id="frame" src="members.html" class="frame"></iframe></main>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
  if(!AX.requireAuth()){ throw 'no-auth'; }
  if(!AX.isAdmin()){ location.replace('app.html'); }
  function tab(which,el){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); document.getElementById('frame').src = which+'.html'; }
</script>
</body>
</html>
