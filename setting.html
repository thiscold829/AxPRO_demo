<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AxPRO | 설정</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD@100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<style>
  body{ font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif; background:#f1f5f9; margin:0; height:100vh; display:flex; flex-direction:column; overflow:hidden; color:#111827; }
  .ms{ font-family:'Material Symbols Outlined'; vertical-align:middle; }
  .tab{ padding:12px 22px; font-weight:800; font-size:14px; color:#64748b; border-bottom:3px solid transparent; cursor:pointer; transition:.2s; }
  .tab.active{ color:#0066cc; border-bottom-color:#0066cc; }
  @media (prefers-color-scheme:dark){ body{ background:#0b0e15; color:#e5ecf6; } header{ background:#141a26 !important; border-color:#2a3446 !important; } .text-slate-800{ color:#e5ecf6 !important; } }
</style>
</head>
<body>
<header class="bg-white border-b border-slate-200 px-6 pt-4 flex justify-between items-end shrink-0">
  <div class="flex items-end gap-6">
    <div class="pb-3"><h1 class="text-xl font-black text-slate-800">AxPRO 설정</h1><p class="text-[11px] text-slate-400 font-bold mt-1">조직 및 과제 관리</p></div>
    <div class="flex gap-1">
      <button class="tab active" onclick="tab('members',this)"><span class="ms mr-1 text-[18px]">group</span> 구성원</button>
      <button class="tab" onclick="tab('projects',this)"><span class="ms mr-1 text-[18px]">folder_special</span> 과제</button>
    </div>
  </div>
  <a href="app.html" class="mb-3 flex items-center gap-2 bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-700 transition"><span class="ms">dashboard</span> 보드로</a>
</header>
<main class="flex-1 relative"><iframe id="frame" src="members.html" class="w-full h-full border-none absolute inset-0"></iframe></main>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
  if(!AX.requireAuth()){}
  if(!AX.isManager()){ location.replace('app.html'); }
  function tab(which,el){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); document.getElementById('frame').src = which+'.html'; }
</script>
</body>
</html>
