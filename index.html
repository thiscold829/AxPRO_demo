<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AxPRO | Login</title>
<style>
  :root{ --brand:#0066cc; }

  /* --- minimal reset (reproduces the parts of Tailwind preflight this page relied on) --- */
  *,::before,::after{ box-sizing:border-box; }
  h1,p{ margin:0; }
  button,input{ font-family:inherit; font-size:100%; }

  body{ font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    margin:0;
    background-color:#f8fafc; background-image:linear-gradient(180deg,#e0f2fe 0%,#f8fafc 400px);
    background-repeat:no-repeat; min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; -webkit-font-smoothing:antialiased; }

  /* --- icons --- */
  .ic{ display:inline-block; vertical-align:-.18em; width:18px; height:18px; flex:none; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  /* --- utility classes replacing Tailwind runtime --- */
  .hidden{ display:none !important; }
  .opacity-50{ opacity:.5; }
  .opacity-80{ opacity:.8; }
  .cursor-not-allowed{ cursor:not-allowed; }

  /* --- semantic classes replacing Tailwind markup --- */
  .login-card{ width:100%; max-width:420px; margin:16px; display:flex; flex-direction:column; align-items:center; }
  .card-body{ padding:40px; width:100%; display:flex; flex-direction:column; align-items:center; }
  .head{ text-align:center; margin-bottom:32px; width:100%; }
  .logo-badge{ display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px; border-radius:16px; background:#eff6ff; margin-bottom:16px; }
  .brand-title{ font-size:40px; font-weight:900; letter-spacing:-0.05em; color:#0066cc; line-height:1; margin-bottom:12px; }
  .brand-sub{ font-size:13px; font-weight:700; color:#64748b; letter-spacing:-0.025em; }
  .brand-sub2{ font-size:12px; font-weight:600; color:#94a3b8; margin-top:4px; }
  .setup-notice{ display:inline-block; font-size:11px; font-weight:700; margin-top:12px; padding:6px 12px; border-radius:8px; }
  .fields{ width:100%; display:flex; flex-direction:column; gap:16px; margin-bottom:32px; }
  .field{ position:relative; }
  .field-icon{ position:absolute; left:16px; top:50%; transform:translateY(-50%); color:#94a3b8; }
  .btn-submit{ width:100%; color:#fff; font-weight:700; font-size:15px; padding:16px 0; border:none; border-radius:16px; cursor:pointer; display:flex; justify-content:center; align-items:center; gap:8px; }
  .error-msg{ margin-top:20px; color:#f43f5e; font-size:13px; font-weight:700; text-align:center; }
  .foot{ margin-top:24px; display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; font-weight:700; color:#cbd5e1; }

  /* --- existing custom classes (unchanged) --- */
  .premium-card{ background:#fff; border-radius:32px; box-shadow:0 30px 60px -15px rgba(0,102,204,.1),0 4px 12px -2px rgba(0,0,0,.04); border:1px solid rgba(0,0,0,.04); overflow:hidden; }
  .card-accent{ height:4px; background:linear-gradient(90deg,#0066cc 0%,#38bdf8 100%); width:100%; }
  .minimal-input{ background:#f4f4f5; border:1.5px solid transparent; border-radius:14px; padding:16px 16px 16px 48px; font-size:15px; font-weight:600; color:#1e293b; outline:none; transition:all .25s cubic-bezier(.4,0,.2,1); width:100%; }
  .minimal-input::placeholder{ color:#94a3b8; font-weight:500; }
  .minimal-input:focus{ background:#fff; border-color:#0066cc; box-shadow:0 0 0 4px rgba(0,102,204,.1); }
  .input-icon{ transition:color .2s; } .input-icon.focused{ color:#0066cc; }
  .btn-login{ background:linear-gradient(135deg,#0066cc 0%,#0284c7 100%); transition:all .25s cubic-bezier(.4,0,.2,1); box-shadow:0 4px 14px rgba(0,102,204,.3); }
  .btn-login:hover{ background:linear-gradient(135deg,#005bb5 0%,#0272ae 100%); box-shadow:0 6px 20px rgba(0,102,204,.4); transform:translateY(-1px); }
  .btn-login:active{ transform:scale(.98); }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .shake{ animation:shake .4s ease; }
  @keyframes spin{ to{transform:rotate(360deg)} } .spin{ display:inline-block; animation:spin .8s linear infinite; }
  .demo-badge{ background:#fef3c7; color:#92400e; }
  @media (prefers-color-scheme:dark){
    body{ background-color:#0b0e15; background-image:linear-gradient(180deg,#0f1830 0%,#0b0e15 400px); color:#e5ecf6; }
    .premium-card{ background:#141a26; border-color:rgba(255,255,255,.06); box-shadow:0 30px 60px -15px rgba(0,0,0,.5); }
    .minimal-input{ background:#1b2231; color:#e5ecf6; } .minimal-input::placeholder{ color:#6b7688; }
    .minimal-input:focus{ background:#0f1522; }
    .demo-badge{ background:rgba(234,179,8,.15); color:#eab308; }
    .logo-badge{ background:rgba(59,130,246,.1); }
    .foot{ color:#475569; }
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-settings_accessibility" viewBox="0 0 24 24"><circle cx="12" cy="3.6" r="1.9"/><path d="M4.5 8h15M12 8v5.5M12 13.5 8.5 21M12 13.5 15.5 21"/></symbol>
  <symbol id="i-person" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
  <symbol id="i-lock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></symbol>
  <symbol id="i-arrow_forward" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></symbol>
  <symbol id="i-autorenew" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></symbol>
</defs></svg>

<div class="premium-card login-card">
  <div class="card-accent"></div>
  <div class="card-body">
    <div class="head">
      <div class="logo-badge">
        <svg class="ic" style="width:28px;height:28px;color:#0066cc"><use href="#i-settings_accessibility"/></svg>
      </div>
      <h1 class="brand-title">AxPRO</h1>
      <p class="brand-sub">AX team Progress Report Overview</p>
      <p class="brand-sub2">AX팀 진행 보고 총괄</p>
      <p id="setupNotice" class="demo-badge setup-notice hidden">⚠ 설정 필요 — config.js 의 API_URL 을 입력한 뒤 사용하세요.</p>
    </div>

    <div class="fields">
      <div class="field">
        <svg id="icon1" class="ic input-icon field-icon" style="width:22px;height:22px"><use href="#i-person"/></svg>
        <input type="text" id="loginName" class="minimal-input" placeholder="이름 (예: 이찬)" autocomplete="username"
          onfocus="document.getElementById('icon1').classList.add('focused')"
          onblur="document.getElementById('icon1').classList.remove('focused')"
          onkeypress="if(event.keyCode==13) document.getElementById('loginPw').focus()">
      </div>
      <div class="field">
        <svg id="icon2" class="ic input-icon field-icon" style="width:20px;height:20px"><use href="#i-lock"/></svg>
        <input type="password" id="loginPw" class="minimal-input" placeholder="PIN (기본: 휴대폰 뒤 4자리)" maxlength="6"
          inputmode="numeric" pattern="[0-9]*" autocomplete="current-password"
          onfocus="document.getElementById('icon2').classList.add('focused')"
          onblur="document.getElementById('icon2').classList.remove('focused')"
          onkeypress="if(event.keyCode==13) handleLogin()">
      </div>
    </div>

    <button id="btnLogin" onclick="handleLogin()" class="btn-login btn-submit">
      <span>로그인 시작</span><svg class="ic" style="width:18px;height:18px"><use href="#i-arrow_forward"/></svg>
    </button>
    <p id="errorMsg" class="error-msg hidden"></p>
  </div>
</div>

<footer class="foot">
  <span>© 2026 AxPRO · CHAN LEE</span>
  <span>v2 · 비공개 시트 게이트웨이</span>
</footer>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
  if (AX.token()) location.replace('app.html');
  if (!AX.configured) {   // 미설정이면 로그인 대신 설정 안내
    document.getElementById('setupNotice').classList.remove('hidden');
    document.getElementById('btnLogin').disabled = true;
    document.getElementById('btnLogin').classList.add('opacity-50','cursor-not-allowed');
  }

  async function handleLogin() {
    if (!AX.configured) return showError('config.js 에 API_URL 을 먼저 설정하세요.');
    var name = document.getElementById('loginName').value.trim();
    var pw = document.getElementById('loginPw').value.trim();
    var btn = document.getElementById('btnLogin');
    if (!name || !pw) return showError('이름과 PIN을 입력하세요.');

    btn.innerHTML = '<span class="spin"><svg class="ic" style="width:20px;height:20px"><use href="#i-autorenew"/></svg></span> <span>인증 중...</span>';
    btn.disabled = true; btn.classList.add('opacity-80','cursor-not-allowed');
    document.getElementById('errorMsg').classList.add('hidden');

    try {
      var res = await AX.login(name, pw);
      if (res && res.ok) { location.replace('app.html'); }
      else { showError((res && res.error) || '로그인 실패'); }
    } catch (e) {
      showError("서버 연결 실패(CORS/네트워크) — Apps Script 배포의 '액세스'를 '모든 사용자'로 설정했는지, 코드 수정 후 '새 버전'으로 재배포했는지 확인하세요.");
      console.error(e);
    }
  }
  function showError(msg) {
    var err = document.getElementById('errorMsg'), btn = document.getElementById('btnLogin');
    err.textContent = msg; err.classList.remove('hidden','shake'); void err.offsetWidth; err.classList.add('shake');
    btn.innerHTML = '<span>로그인</span> <svg class="ic" style="width:18px;height:18px"><use href="#i-arrow_forward"/></svg>';
    btn.disabled = false; btn.classList.remove('opacity-80','cursor-not-allowed');
  }
</script>
</body>
</html>
