<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AxPRO | 과제 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD@100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<style>
  body{ font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif; background:#f1f5f9; color:#111827; -webkit-font-smoothing:antialiased; margin:0; }
  .ms{ font-family:'Material Symbols Outlined'; vertical-align:middle; line-height:1; }
  .form-input{ width:100%; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:11px 14px; font-size:14px; font-weight:600; outline:none; color:#111827; }
  .form-input:focus{ background:#fff; border-color:#0066cc; box-shadow:0 0 0 3px rgba(0,102,204,.1); }
  .overlay{ position:fixed; inset:0; background:rgba(15,23,42,.3); backdrop-filter:blur(8px); z-index:100; display:none; align-items:center; justify-content:center; padding:16px; }
  .overlay.active{ display:flex; }
  .st{ font-size:11px; font-weight:900; display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:8px; }
  .st .d{ width:6px; height:6px; border-radius:50%; }
  .st-제안{ background:#fef3c7; color:#92400e; } .st-제안 .d{ background:#92400e; }
  .st-진행{ background:#dcfce7; color:#166534; } .st-진행 .d{ background:#166534; }
  .st-완료{ background:#e5e7eb; color:#4b5563; } .st-완료 .d{ background:#4b5563; }
  .st-기타{ background:#dbeafe; color:#1e40af; } .st-기타 .d{ background:#1e40af; }
  .st-문제발생{ background:#fee2e2; color:#b91c1c; } .st-문제발생 .d{ background:#b91c1c; }
  #toast{ position:fixed; top:16px; left:50%; transform:translateX(-50%); background:#0f172a; color:#fff; padding:11px 24px; border-radius:99px; font-size:13px; font-weight:700; opacity:0; transition:.35s; z-index:400; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(6px); }
  .lb{ display:block; font-size:10px; font-weight:800; color:#94a3b8; text-transform:uppercase; letter-spacing:.05em; margin:0 0 5px 2px; }
  @media (prefers-color-scheme:dark){
    body{ background:#0b0e15; color:#e5ecf6; }
    .form-input{ background:#1b2231; border-color:#2a3446; color:#e5ecf6; }
    .bg-white{ background:#141a26 !important; } .border-slate-200,.border-slate-100{ border-color:#2a3446 !important; }
    .text-slate-800,.text-slate-700{ color:#e5ecf6 !important; } .text-slate-500,.text-slate-400{ color:#8b98ad !important; }
  }
</style>
</head>
<body>
<div class="max-w-[1100px] mx-auto p-5 lg:p-8">
  <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
    <div><h1 class="text-xl font-black text-slate-800">과제 관리</h1><p id="cnt" class="text-[12px] font-bold text-slate-400 mt-1">불러오는 중...</p></div>
    <div class="flex items-center gap-2">
      <div class="flex items-center gap-1.5 text-[11px] font-bold text-slate-400"><div id="dot" class="w-2 h-2 rounded-full bg-emerald-500"></div><span id="stat">저장됨</span></div>
      <a href="app.html" class="text-[12px] font-bold text-slate-500 hover:text-[#0066cc] px-3 py-2 rounded-lg transition flex items-center gap-1"><span class="ms text-[17px]">arrow_back</span> 보드</a>
      <button onclick="openEdit(-1)" class="bg-[#0066cc] text-white text-[13px] font-bold px-4 py-2.5 rounded-lg hover:bg-blue-700 transition flex items-center gap-1"><span class="ms text-[17px]">add</span> 새 과제</button>
    </div>
  </div>
  <div id="list" class="flex flex-col gap-2"><div class="text-center text-slate-400 py-16 font-bold">불러오는 중...</div></div>
</div>

<div class="overlay" id="modal">
  <div class="bg-white rounded-2xl w-full max-w-[500px] p-7 relative shadow-2xl">
    <button onclick="close_()" class="absolute top-5 right-5 text-slate-400 hover:text-rose-500"><span class="ms text-[22px]">close</span></button>
    <h3 class="text-[13px] font-black tracking-widest text-slate-400 mb-5 uppercase">Project Details</h3>
    <input type="hidden" id="eIdx"><input type="hidden" id="eId"><input type="hidden" id="eRev">
    <div class="mb-3"><label class="lb">약어 (보드 표시명) *</label><input id="eShort" class="form-input font-black"></div>
    <div class="mb-3"><label class="lb">정식 명칭 *</label><input id="eFull" class="form-input"></div>
    <div class="grid grid-cols-2 gap-3 mb-3">
      <div><label class="lb">담당 팀</label><input id="eTeam" class="form-input" list="teamL"><datalist id="teamL"><option value="식품AX"><option value="환경AX"></datalist></div>
      <div><label class="lb">담당자</label><input id="eManager" class="form-input"></div>
    </div>
    <div class="mb-2"><label class="lb">상태</label><select id="eStatus" class="form-input cursor-pointer"><option>제안</option><option>진행</option><option>완료</option><option>기타</option><option>문제발생</option></select></div>
    <div class="flex justify-between items-center mt-6 pt-5 border-t border-slate-100">
      <button id="delBtn" onclick="del_()" class="text-rose-500 font-bold text-[13px] hover:bg-rose-50 px-4 py-2 rounded-lg">삭제</button>
      <button onclick="save_()" class="bg-[#0066cc] text-white font-bold text-[13px] px-8 py-3 rounded-lg hover:bg-blue-700 shadow-md">저장</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
  if(!AX.requireAuth()){ throw 'no-auth'; }
  if(!AX.isAdmin()){ document.body.innerHTML='<div style="text-align:center;padding:80px 20px;font-weight:700;color:#64748b">총괄관리자(admin)만 접근할 수 있습니다. <a href="app.html" style="color:#0066cc">보드로</a></div>'; throw 'no-perm'; }
  let projects=[];
  AX.onStatus(s=>{ const d=document.getElementById('dot'),t=document.getElementById('stat'); d.className='w-2 h-2 rounded-full '+(s.offline?'bg-rose-500':s.pending?'bg-blue-500':'bg-emerald-500'); t.textContent=s.offline?'오프라인 · 대기 '+s.pending:s.pending?'저장 중…':'저장됨'; });
  AX.onApply((sheet,r)=>{ if(sheet!=='projects')return; const i=projects.findIndex(p=>p.id===r.id);
    if(r.status==='applied'){ if(i>-1&&r.serverRow&&!AX.hasPending('projects',r.id,r.opId))projects[i]=r.serverRow; else if(i>-1&&r.rev!=null)projects[i].rev=r.rev; }
    else if(r.status==='conflict'){ if(r.serverRow){ if(i>-1)projects[i]=r.serverRow; else if(r.serverRow.deleted!==true)projects.push(r.serverRow); } toast('다른 관리자가 먼저 수정 — 최신본으로 갱신'); render(); }
    else if(r.status==='error'){ toast('거부: '+(r.error||'')+' — 새로고침합니다.'); init(); } });

  window.onload = init;
  async function init(){ const res=await AX.pull(['projects']); projects=(res.data.projects||[]).filter(p=>p.deleted!==true).sort((a,b)=>(+a.order||999)-(+b.order||999)); render(); }

  function render(){
    document.getElementById('cnt').textContent=`총 ${projects.length}개`;
    document.getElementById('list').innerHTML = projects.length? projects.map((p,idx)=>`
      <div onclick="openEdit(${idx})" class="bg-white border border-slate-200 rounded-xl px-5 py-3.5 grid grid-cols-[90px_1fr_110px_100px_110px_28px] items-center gap-3 cursor-pointer hover:border-sky-300 transition">
        <div class="text-[10px] font-black bg-slate-900 text-white px-2 py-1 rounded text-center">${esc(p.short_name)}</div>
        <div class="text-[14px] font-bold text-slate-700 truncate">${esc(p.full_name)}</div>
        <div class="text-[12px] font-bold text-slate-400">${esc(p.team||'')}</div>
        <div class="text-[12px] font-bold text-slate-500">${esc(p.manager||'')}</div>
        <div><span class="st st-${esc(p.status)}"><span class="d"></span>${esc(p.status||'')}</span></div>
        <div class="text-right opacity-30"><span class="ms text-[18px]">edit_note</span></div>
      </div>`).join('') : '<div class="text-center text-slate-400 py-16 font-bold">등록된 과제가 없습니다.</div>';
  }
  function openEdit(idx){
    document.getElementById('eIdx').value=idx;
    document.getElementById('delBtn').style.display=idx===-1?'none':'inline-block';
    const p=idx===-1?{status:'제안'}:projects[idx];
    document.getElementById('eId').value=p.id||''; document.getElementById('eRev').value=p.rev||0;
    document.getElementById('eShort').value=p.short_name||''; document.getElementById('eFull').value=p.full_name||'';
    document.getElementById('eTeam').value=p.team||''; document.getElementById('eManager').value=p.manager||''; document.getElementById('eStatus').value=p.status||'제안';
    document.getElementById('modal').classList.add('active');
  }
  function close_(){ document.getElementById('modal').classList.remove('active'); }
  function save_(){
    const idx=+document.getElementById('eIdx').value;
    const short=v('eShort'), full=v('eFull');
    if(!short||!full) return toast('약어·정식명칭은 필수입니다.');
    const fields={ short_name:short, full_name:full, team:v('eTeam'), manager:v('eManager'), status:document.getElementById('eStatus').value,
      order: idx===-1?projects.length+1:(projects[idx].order||idx+1) };
    const id=document.getElementById('eId').value || ('P-'+AX.uuid());
    const rev=idx===-1?0:(+document.getElementById('eRev').value||0);
    if(idx===-1) projects.push(Object.assign({id,rev:0,deleted:false},fields)); else Object.assign(projects[idx],fields);
    AX.enqueue({ sheet:'projects', type:'upsert', id, baseRev:rev, fields });
    close_(); render();
  }
  function del_(){
    const idx=+document.getElementById('eIdx').value; if(idx<0) return;
    const p=projects[idx]; if(!confirm(`'${p.short_name}' 과제를 삭제하시겠습니까? (소프트 삭제)`)) return;
    AX.enqueue({ sheet:'projects', type:'delete', id:p.id, baseRev:+p.rev||0, fields:{} });
    projects.splice(idx,1); close_(); render();
  }
  function v(id){ return document.getElementById(id).value.trim(); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2600); }
</script>
</body>
</html>
