<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AxPRO | 구성원 관리</title>
<style>
  *,*::before,*::after{ box-sizing:border-box; }
  body{ font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif; background:#f1f5f9; color:#111827; -webkit-font-smoothing:antialiased; margin:0; }
  button{ font-family:inherit; font-size:100%; font-weight:inherit; line-height:inherit; color:inherit; margin:0; padding:0; background:transparent; border:0; cursor:pointer; }
  input{ font-family:inherit; }
  a{ color:inherit; text-decoration:none; }
  h1,h3,p{ margin:0; }
  ::placeholder{ color:#9ca3af; opacity:1; }
  .ic{ display:inline-block; vertical-align:-.18em; width:18px; height:18px; flex:none; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  /* --- existing custom classes (unchanged) --- */
  .form-input{ width:100%; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:11px 14px; font-size:14px; font-weight:600; outline:none; color:#111827; }
  .form-input:focus{ background:#fff; border-color:#0066cc; box-shadow:0 0 0 3px rgba(0,102,204,.1); }
  .overlay{ position:fixed; inset:0; background:rgba(15,23,42,.3); backdrop-filter:blur(8px); z-index:100; display:none; align-items:center; justify-content:center; padding:16px; }
  .overlay.active{ display:flex; }
  #toast{ position:fixed; top:16px; left:50%; transform:translateX(-50%); background:#0f172a; color:#fff; padding:11px 24px; border-radius:99px; font-size:13px; font-weight:700; opacity:0; transition:.35s; z-index:400; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(6px); }

  /* --- plain-CSS replacements for the Tailwind utilities this page uses --- */
  /* display / layout */
  .flex{ display:flex; } .grid{ display:grid; } .flex-col{ flex-direction:column; } .flex-wrap{ flex-wrap:wrap; }
  .flex-1{ flex:1 1 0%; }
  .items-center{ align-items:center; } .justify-between{ justify-content:space-between; }
  .grid-cols-2{ grid-template-columns:repeat(2,minmax(0,1fr)); }
  .grid-cols-\[60px_1fr_100px_1fr_28px\]{ grid-template-columns:60px 1fr 100px 1fr 28px; }
  .relative{ position:relative; } .absolute{ position:absolute; }
  .top-5{ top:1.25rem; } .right-5{ right:1.25rem; }
  .overflow-y-auto{ overflow-y:auto; }
  .text-center{ text-align:center; } .text-right{ text-align:right; }
  .mx-auto{ margin-left:auto; margin-right:auto; }
  /* sizing */
  .w-2{ width:.5rem; } .h-2{ height:.5rem; } .h-px{ height:1px; } .w-full{ width:100%; }
  .max-w-\[1100px\]{ max-width:1100px; } .max-w-\[600px\]{ max-width:600px; } .max-h-\[90vh\]{ max-height:90vh; }
  /* spacing */
  .p-5{ padding:1.25rem; } .p-7{ padding:1.75rem; }
  .px-2{ padding-left:.5rem; padding-right:.5rem; } .px-3{ padding-left:.75rem; padding-right:.75rem; }
  .px-4{ padding-left:1rem; padding-right:1rem; } .px-5{ padding-left:1.25rem; padding-right:1.25rem; }
  .px-8{ padding-left:2rem; padding-right:2rem; } .px-1\.5{ padding-left:.375rem; padding-right:.375rem; }
  .py-2{ padding-top:.5rem; padding-bottom:.5rem; } .py-3{ padding-top:.75rem; padding-bottom:.75rem; }
  .py-2\.5{ padding-top:.625rem; padding-bottom:.625rem; } .py-0\.5{ padding-top:.125rem; padding-bottom:.125rem; }
  .py-16{ padding-top:4rem; padding-bottom:4rem; } .pt-5{ padding-top:1.25rem; }
  .gap-1{ gap:.25rem; } .gap-1\.5{ gap:.375rem; } .gap-2{ gap:.5rem; } .gap-3{ gap:.75rem; }
  .mt-1{ margin-top:.25rem; } .mt-3{ margin-top:.75rem; } .mt-6{ margin-top:1.5rem; } .ml-1{ margin-left:.25rem; }
  .mb-2{ margin-bottom:.5rem; } .mb-4{ margin-bottom:1rem; } .mb-5{ margin-bottom:1.25rem; } .mb-6{ margin-bottom:1.5rem; } .mb-1\.5{ margin-bottom:.375rem; }
  /* borders & radius */
  .border{ border-width:1px; border-style:solid; } .border-t{ border-top-width:1px; border-style:solid; }
  .border-slate-100{ border-color:#f1f5f9; } .border-slate-200{ border-color:#e2e8f0; }
  .rounded{ border-radius:.25rem; } .rounded-lg{ border-radius:.5rem; } .rounded-xl{ border-radius:.75rem; } .rounded-2xl{ border-radius:1rem; } .rounded-full{ border-radius:9999px; }
  /* colors */
  .bg-white{ background:#fff; } .bg-\[\#0066cc\]{ background-color:#0066cc; }
  .bg-emerald-500{ background-color:#22c55e; } .bg-rose-500{ background-color:#f43f5e; } .bg-blue-500{ background-color:#3b82f6; }
  .bg-slate-50{ background:#f8fafc; } .bg-slate-100{ background-color:#f1f5f9; } .bg-slate-200{ background-color:#e2e8f0; } .bg-slate-900{ background-color:#0f172a; }
  .text-white{ color:#fff; } .text-slate-800{ color:#1e293b; } .text-slate-500{ color:#64748b; } .text-slate-400{ color:#94a3b8; }
  .text-blue-500{ color:#3b82f6; } .text-rose-500{ color:#f43f5e; }
  /* typography */
  .text-xl{ font-size:1.25rem; line-height:1.75rem; }
  .text-\[10px\]{ font-size:10px; } .text-\[11px\]{ font-size:11px; } .text-\[12px\]{ font-size:12px; } .text-\[13px\]{ font-size:13px; } .text-\[14px\]{ font-size:14px; }
  .font-medium{ font-weight:500; } .font-semibold{ font-weight:600; } .font-bold{ font-weight:700; } .font-black{ font-weight:900; }
  .uppercase{ text-transform:uppercase; } .tracking-widest{ letter-spacing:.1em; }
  .truncate{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .opacity-30{ opacity:.3; } .cursor-pointer{ cursor:pointer; }
  /* effects */
  .shadow-md{ box-shadow:0 4px 6px -1px rgb(0 0 0/.1),0 2px 4px -2px rgb(0 0 0/.1); }
  .shadow-2xl{ box-shadow:0 25px 50px -12px rgb(0 0 0/.25); }
  .transition{ transition:.15s cubic-bezier(.4,0,.2,1); }
  /* hover */
  .hover\:text-\[\#0066cc\]:hover{ color:#0066cc; }
  .hover\:bg-blue-700:hover{ background-color:#1d4ed8; }
  .hover\:text-rose-500:hover{ color:#f43f5e; }
  .hover\:bg-rose-50:hover{ background-color:#fff1f2; }
  .hover\:border-sky-300:hover{ border-color:#7dd3fc; }
  /* responsive */
  @media (min-width:1024px){ .lg\:p-8{ padding:2rem; } }

  @media (prefers-color-scheme:dark){
    body{ background:#0b0e15; color:#e5ecf6; }
    .form-input{ background:#1b2231; border-color:#2a3446; color:#e5ecf6; }
    .bg-white{ background:#141a26 !important; } .border-slate-200,.border-slate-100{ border-color:#2a3446 !important; }
    .text-slate-800{ color:#e5ecf6 !important; } .text-slate-500,.text-slate-400{ color:#8b98ad !important; } .bg-slate-50{ background:#161d2a !important; }
  }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-person_add" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/></symbol>
  <symbol id="i-arrow_back" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></symbol>
  <symbol id="i-close" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></symbol>
  <symbol id="i-edit_note" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></symbol>
</defs></svg>
<div class="max-w-[1100px] mx-auto p-5 lg:p-8">
  <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
    <div>
      <h1 class="text-xl font-black text-slate-800">구성원 관리</h1>
      <p id="memberCount" class="text-[12px] font-bold text-slate-400 mt-1">불러오는 중...</p>
    </div>
    <div class="flex items-center gap-2">
      <div class="flex items-center gap-1.5 text-[11px] font-bold text-slate-400"><div id="dot" class="w-2 h-2 rounded-full bg-emerald-500"></div><span id="stat">저장됨</span></div>
      <a href="app.html" class="text-[12px] font-bold text-slate-500 hover:text-[#0066cc] px-3 py-2 rounded-lg transition flex items-center gap-1"><svg class="ic" style="width:17px;height:17px"><use href="#i-arrow_back"/></svg> 보드</a>
      <button onclick="openEdit(-1)" class="bg-[#0066cc] text-white text-[13px] font-bold px-4 py-2.5 rounded-lg hover:bg-blue-700 transition flex items-center gap-1"><svg class="ic" style="width:17px;height:17px"><use href="#i-person_add"/></svg> 새 멤버</button>
    </div>
  </div>
  <div id="list" class="flex flex-col gap-2"><div class="text-center text-slate-400 text-[13px] font-bold py-16">불러오는 중...</div></div>
</div>

<div class="overlay" id="modal">
  <div class="bg-white rounded-2xl w-full max-w-[600px] p-7 relative shadow-2xl max-h-[90vh] overflow-y-auto">
    <button onclick="close_()" class="absolute top-5 right-5 text-slate-400 hover:text-rose-500"><svg class="ic" style="width:22px;height:22px"><use href="#i-close"/></svg></button>
    <h3 class="text-[13px] font-black tracking-widest text-slate-400 mb-5 uppercase">Member Details</h3>
    <input type="hidden" id="eIdx"><input type="hidden" id="eId"><input type="hidden" id="eRev">
    <div class="grid grid-cols-2 gap-3">
      <div><label class="lb">성명 *</label><input id="eName" class="form-input font-black"></div>
      <div><label class="lb">약어</label><input id="eAbbr" class="form-input text-center font-black"></div>
      <div><label class="lb">부서</label><input id="eDept" class="form-input" placeholder="식품 AX팀" list="deptL"><datalist id="deptL"></datalist></div>
      <div><label class="lb">직급</label><input id="eRank" class="form-input" list="rankL"><datalist id="rankL"><option value="대표"><option value="본부장"><option value="실장"><option value="팀장"><option value="부장"><option value="차장"><option value="과장"><option value="대리"><option value="주임"><option value="연구원"><option value="인턴"></datalist></div>
      <div><label class="lb">역할</label><input id="eRole" class="form-input" list="roleL"><datalist id="roleL"><option value="관리자"><option value="팀장"><option value="팀원"><option value="인턴"></datalist></div>
      <div><label class="lb">PIN (로그인 비번)</label><input id="ePin" class="form-input text-center" inputmode="numeric" placeholder="신규=휴대폰뒤4 / 수정=비우면 유지"></div>
      <div><label class="lb">내선</label><input id="eExt" class="form-input"></div>
      <div><label class="lb">사무실 전화</label><input id="eTel" class="form-input"></div>
      <div><label class="lb">휴대폰</label><input id="eMobile" class="form-input" placeholder="010-0000-0000"></div>
      <div><label class="lb">이메일</label><input id="eEmail" class="form-input"></div>
    </div>
    <p class="text-[11px] text-slate-400 font-medium mt-3">※ 휴대폰(또는 PIN)이 로그인 비밀번호로 쓰입니다. 최소 4자리 필요.</p>
    <div class="flex justify-between items-center mt-6 pt-5 border-t border-slate-100">
      <button id="delBtn" onclick="del_()" class="text-rose-500 font-bold text-[13px] hover:bg-rose-50 px-4 py-2 rounded-lg">삭제</button>
      <button onclick="save_()" class="bg-[#0066cc] text-white font-bold text-[13px] px-8 py-3 rounded-lg hover:bg-blue-700 shadow-md">저장</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<style>.lb{ display:block; font-size:10px; font-weight:800; color:#94a3b8; text-transform:uppercase; letter-spacing:.05em; margin:0 0 5px 2px; }</style>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
  if(!AX.requireAuth()){ throw 'no-auth'; }
  if(!AX.isAdmin()){ document.body.innerHTML='<div style="text-align:center;padding:80px 20px;font-weight:700;color:#64748b">총괄관리자(admin)만 접근할 수 있습니다. <a href="app.html" style="color:#0066cc">보드로</a></div>'; throw 'no-perm'; }
  const me = AX.user()||{name:'관리자'};
  let members=[];
  AX.onStatus(s=>{ const d=document.getElementById('dot'),t=document.getElementById('stat'); d.className='w-2 h-2 rounded-full '+(s.offline?'bg-rose-500':s.pending?'bg-blue-500':'bg-emerald-500'); t.textContent=s.offline?'오프라인 · 대기 '+s.pending:s.pending?'저장 중…':'저장됨'; });
  AX.onApply((sheet,r)=>{ if(sheet!=='members')return; const i=members.findIndex(m=>m.id===r.id);
    if(r.status==='applied'){ if(i>-1&&r.serverRow&&!AX.hasPending('members',r.id,r.opId))members[i]=r.serverRow; else if(i>-1&&r.rev!=null)members[i].rev=r.rev; }
    else if(r.status==='conflict'){ if(r.serverRow){ if(i>-1)members[i]=r.serverRow; else if(r.serverRow.deleted!==true)members.push(r.serverRow); } toast('다른 관리자가 먼저 수정 — 최신본으로 갱신'); render(); }
    else if(r.status==='error'){ toast('거부: '+(r.error||'')+' — 새로고침합니다.'); init(); } });

  window.onload = init;
  async function init(){ const res=await AX.pull(['members']); members=(res.data.members||[]).filter(m=>m.deleted!==true); render(); }

  function render(){
    document.getElementById('memberCount').textContent=`총 ${members.length}명`;
    const depts=[...new Set(members.map(m=>m.dept).filter(Boolean))];
    document.getElementById('deptL').innerHTML=depts.map(d=>`<option value="${esc(d)}">`).join('');
    const grouped={}; members.forEach((m,idx)=>{ const d=m.dept||'(부서 미지정)'; (grouped[d]=grouped[d]||[]).push({m,idx}); });
    document.getElementById('list').innerHTML=Object.entries(grouped).map(([dept,arr])=>`
      <div class="mb-4">
        <div class="flex items-center gap-2 mb-2"><span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${esc(dept)}</span><span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">${arr.length}명</span><div class="flex-1 h-px bg-slate-200"></div></div>
        ${arr.map(({m,idx})=>`<div onclick="openEdit(${idx})" class="bg-white border border-slate-200 rounded-xl px-5 py-3 mb-1.5 grid grid-cols-[60px_1fr_100px_1fr_28px] items-center gap-3 cursor-pointer hover:border-sky-300 transition">
          <div class="text-[11px] font-bold text-slate-400 text-center">${esc(m.rank||'')}</div>
          <div class="text-[14px] font-black text-slate-800">${esc(m.name||'')} ${m.abbr?`<span class="text-[10px] font-black bg-slate-900 text-white px-1.5 py-0.5 rounded ml-1">${esc(m.abbr)}</span>`:''}</div>
          <div class="text-[11px] font-bold text-slate-400">${esc(m.role||'')}</div>
          <div class="text-[12px] font-semibold text-blue-500 truncate">${esc(m.email||'')}</div>
          <div class="text-right opacity-30"><svg class="ic" style="width:18px;height:18px"><use href="#i-edit_note"/></svg></div>
        </div>`).join('')}
      </div>`).join('') || '<div class="text-center text-slate-400 py-16 font-bold">등록된 멤버가 없습니다.</div>';
  }

  function openEdit(idx){
    document.getElementById('eIdx').value=idx;
    document.getElementById('delBtn').style.display=idx===-1?'none':'inline-block';
    const m = idx===-1?{}:members[idx];
    document.getElementById('eId').value=m.id||''; document.getElementById('eRev').value=m.rev||0;
    ['Name','Abbr','Dept','Rank','Role','Ext','Tel','Mobile','Email','Pin'].forEach(k=>{ document.getElementById('e'+k).value=m[k.toLowerCase()]||''; });
    document.getElementById('modal').classList.add('active');
  }
  function close_(){ document.getElementById('modal').classList.remove('active'); }
  function save_(){
    const idx=+document.getElementById('eIdx').value;
    const name=document.getElementById('eName').value.trim();
    if(!name) return toast('성명은 필수입니다.');
    const fields={ name, abbr:v('eAbbr'), dept:v('eDept'), rank:v('eRank'), role:v('eRole'), ext:v('eExt'), tel:v('eTel'), mobile:v('eMobile'), email:v('eEmail') };
    const pinVal=v('ePin'); if(pinVal) fields.pin=pinVal;   // 비우면 기존 PIN 유지(덮어쓰지 않음)
    const id = document.getElementById('eId').value || ('M-'+AX.uuid());
    const rev = idx===-1?0:(+document.getElementById('eRev').value||0);
    if(idx===-1){ members.push(Object.assign({id,rev:0,deleted:false},fields)); }
    else { Object.assign(members[idx], fields); }
    AX.enqueue({ sheet:'members', type:'upsert', id, baseRev:rev, fields });
    close_(); render();
  }
  function del_(){
    const idx=+document.getElementById('eIdx').value; if(idx<0) return;
    const m=members[idx];
    if(!confirm(`'${m.name}' 멤버를 삭제하시겠습니까? (소프트 삭제)`)) return;
    AX.enqueue({ sheet:'members', type:'delete', id:m.id, baseRev:+m.rev||0, fields:{} });
    members.splice(idx,1); close_(); render();
  }
  function v(id){ return document.getElementById(id).value.trim(); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2600); }
</script>
</body>
</html>
